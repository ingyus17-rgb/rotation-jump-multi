<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rotation Jump - Multiplayer</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #1a1a2e; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; height: 100dvh; color: white; font-family: 'Segoe UI', sans-serif; touch-action: none; user-select: none; }
        #game-container { position: relative; display: flex; justify-content: center; align-items: center; width: 100vw; height: 100vh; }
        canvas { background-color: #16213e; border: 3px solid #0f3460; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); max-width: 100vw; max-height: 100vh; object-fit: contain; z-index: 1; }
        .controls { position: absolute; top: 10px; width: 100%; text-align: center; pointer-events: none; z-index: 5; opacity: 0.7; }
        #dash-ui { position: absolute; bottom: 20px; right: 20px; font-size: 1rem; font-weight: bold; padding: 8px 15px; border-radius: 8px; background: rgba(0,0,0,0.5); border: 2px solid #e94560; color: #fff; z-index: 10; transition: all 0.2s; }
        .dash-ready { border-color: #60e945 !important; color: #60e945 !important; box-shadow: 0 0 15px rgba(96, 233, 69, 0.5); }
        #role-text { color: #ffeb3b; font-weight: bold; font-size: 1.2rem; }
        #ui { position: absolute; top: 30%; font-size: 8vw; font-weight: bold; color: #ffeb3b; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); display: none; z-index: 10; pointer-events: none; text-align: center; width: 100%; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        .restart-text { display: block; font-size: 4vw; color: #ffffff; margin-top: 15px; animation: blink 1.5s infinite; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
        #slow-mo-text { position: absolute; top: 20%; font-size: 6vw; font-weight: bold; color: #e94560; opacity: 0; transition: opacity 0.2s; pointer-events: none; letter-spacing: 5px; text-shadow: 0 0 10px #e94560; text-align: center; width: 100%; z-index: 5;}
        
        #latest-msg { position: absolute; bottom: 20px; left: 20px; background: rgba(0,0,0,0.6); padding: 8px 15px; border-radius: 20px; font-size: 0.9rem; color: #fff; border: 1px solid rgba(255,255,255,0.2); cursor: pointer; z-index: 20; max-width: 60%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; pointer-events: auto; transition: all 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        #latest-msg:hover { background: rgba(255,255,255,0.2); border-color: #fff; }

        #chat-container { display: none; position: absolute; bottom: 20px; left: 20px; width: 300px; height: 200px; background: rgba(0,0,0,0.75); border-radius: 8px; flex-direction: column; z-index: 30; pointer-events: auto; box-shadow: 0 10px 20px rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.3); backdrop-filter: blur(5px); }
        #chat-messages { flex-grow: 1; overflow-y: auto; padding: 10px; font-size: 0.9rem; display: flex; flex-direction: column; gap: 4px; text-shadow: 1px 1px 2px black; pointer-events: auto; }
        #chat-input { background: rgba(0,0,0,0.8); border: none; border-top: 1px solid rgba(255,255,255,0.3); padding: 12px; color: white; outline: none; border-bottom-left-radius: 8px; border-bottom-right-radius: 8px; font-family: inherit; font-size: 1rem; }
        #chat-input:focus { background: rgba(20,20,40,0.9); }
        
        .msg-sys { color: #60e945; font-weight: bold; }
        .msg-1p { color: #f9d342; font-weight: bold; }
        .msg-2p { color: #42cbf9; font-weight: bold; }
        .msg-spec { color: #aaaaaa; font-style: italic; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <div id="game-container">
        <div class="controls">
            <h2>🌀 Duel: Online Multiplayer</h2>
            <p id="role-text">서버 연결 대기 중...</p>
        </div>
        <div id="dash-ui" class="dash-ready">DASH: READY</div>
        <div id="ui">GAME OVER</div>
        <div id="slow-mo-text">BULLET TIME</div>
        
        <div id="latest-msg">💬 대화하려면 여기를 클릭하세요</div>

        <div id="chat-container">
            <div id="chat-messages"></div>
            <input type="text" id="chat-input" placeholder="엔터로 전송 / 빈 화면 터치로 닫기" autocomplete="off">
        </div>
    </div>

    <script>
        const socket = io();
        let myRole = null;

        const Engine = Matter.Engine, Render = Matter.Render, Runner = Matter.Runner, Bodies = Matter.Bodies, Body = Matter.Body, Composite = Matter.Composite;
        const engine = Engine.create();

        const render = Render.create({ 
            element: document.getElementById('game-container'), 
            engine: engine, 
            options: { width: 900, height: 550, wireframes: false, background: 'transparent' } 
        });

        const ground = Bodies.rectangle(450, 520, 910, 120, { isStatic: true, render: { fillStyle: '#4a4e69' } });
        Composite.add(engine.world, [ground]);

        const clientBodies = {};

        function createDummyCharacter(x, y, coreColor, stickColor) {
            const core = Bodies.circle(x, y, 25, { render: { fillStyle: coreColor }, density: 1.0 });
            const stick = Bodies.rectangle(x + 60, y, 100, 15, { render: { fillStyle: stickColor }, chamfer: { radius: 5 }, density: 0.0001 });
            return Body.create({ parts: [core, stick], isSensor: true, isStatic: true }); 
        }

        socket.on('role_assign', (data) => {
            myRole = data.label;
            document.getElementById('role-text').innerText = myRole === 'player' ? "당신은 1P (노란색) 입니다!" : "당신은 2P (파란색) 입니다!";
        });

        socket.on('spectator', (msg) => {
            document.getElementById('role-text').innerText = msg;
        });

        const canvasElement = document.querySelector('canvas');
        const slowMoText = document.getElementById('slow-mo-text');

        socket.on('sync_state', (gameState) => {
            if (gameState._isSlowMo) {
                canvasElement.style.borderColor = '#e94560'; 
                canvasElement.style.boxShadow = '0 10px 40px rgba(233, 69, 96, 0.5)'; 
                slowMoText.style.opacity = '1';
            } else {
                canvasElement.style.borderColor = '#0f3460'; 
                canvasElement.style.boxShadow = '0 10px 30px rgba(0,0,0,0.8)'; 
                slowMoText.style.opacity = '0';
            }

            for (let id in gameState) {
                if (id === '_isSlowMo') continue; 

                const serverData = gameState[id];
                
                if (!clientBodies[id]) {
                    const is1P = serverData.label === 'player';
                    clientBodies[id] = createDummyCharacter(
                        serverData.x, serverData.y, 
                        is1P ? '#f9d342' : '#42cbf9', 
                        is1P ? '#e94560' : '#60e945'
                    );
                    Composite.add(engine.world, clientBodies[id]);
                }

                Body.setPosition(clientBodies[id], { x: serverData.x, y: serverData.y });
                Body.setAngle(clientBodies[id], serverData.angle);
            }

            for (let id in clientBodies) {
                if (!gameState[id]) {
                    Composite.remove(engine.world, clientBodies[id]);
                    delete clientBodies[id];
                }
            }
        });

        function createSparks(x, y) {
            const particles = [];
            const sparkColors = ['#ffeb3b', '#ff9800', '#ffffff'];
            const sparkCount = Math.floor(Math.random() * 3 + 2);
            for (let i = 0; i < sparkCount; i++) {
                const color = sparkColors[Math.floor(Math.random() * sparkColors.length)];
                const radius = Math.random() * 2 + 1;
                const spark = Bodies.circle(x, y, radius, { render: { fillStyle: color }, friction: 0, frictionAir: 0.05, restitution: 0.9, density: 0.001 });
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 10 + 5; 
                Body.setVelocity(spark, { x: Math.cos(angle) * speed, y: Math.sin(angle) * speed });
                particles.push(spark);
            }
            if (particles.length > 0) { 
                Composite.add(engine.world, particles); 
                setTimeout(() => { Composite.remove(engine.world, particles); }, Math.random() * 100 + 200); 
            }
        }

        function createExplosion(x, y, label) {
            const colors = label === 'player' ? ['#f9d342', '#e94560'] : ['#42cbf9', '#60e945'];
            const particles = [];
            for (let i = 0; i < 40; i++) {
                const color = colors[Math.floor(Math.random() * colors.length)];
                const radius = Math.random() * 5 + 2; 
                const sides = Math.floor(Math.random() * 3) + 3; 
                const particle = Bodies.polygon(x, y, sides, radius, { render: { fillStyle: color }, friction: 0.8, restitution: 0.6, density: 0.01 });
                const angle = Math.random() * Math.PI * 2; 
                const speed = Math.random() * 15 + 5; 
                Body.setVelocity(particle, { x: Math.cos(angle) * speed, y: Math.sin(angle) * speed });
                Body.setAngularVelocity(particle, (Math.random() - 0.5) * 2);
                particles.push(particle);
            }
            Composite.add(engine.world, particles); 
            setTimeout(() => { Composite.remove(engine.world, particles); }, 3000);
        }

        const ui = document.getElementById('ui');

        socket.on('create_spark', (data) => { createSparks(data.x, data.y); });

        socket.on('game_over', (data) => {
            createExplosion(data.x, data.y, data.loserLabel);
            const restartMsg = "<br><span class='restart-text'><span id='countdown-num'>3</span>초 후 재시작됩니다...</span>";

            if (myRole === data.winnerLabel) {
                ui.innerHTML = "YOU WIN!" + restartMsg;
                ui.style.color = '#60e945';
            } else if (myRole === data.loserLabel) {
                ui.innerHTML = "YOU DIED!" + restartMsg;
                ui.style.color = '#e94560';
            } else {
                ui.innerHTML = "GAME OVER" + restartMsg;
            }
            ui.style.display = 'block';
        });

        socket.on('countdown', (count) => {
            const countSpan = document.getElementById('countdown-num');
            if (countSpan) countSpan.innerText = count;
        });

        socket.on('game_reset', () => { ui.style.display = 'none'; });

        socket.on('waiting_players', () => {
            ui.innerHTML = "상대방을 기다리는 중...<br><span class='restart-text'>WAITING FOR OPPONENT</span>";
            ui.style.color = '#ffffff';
            ui.style.display = 'block';
        });

        // 스마트 채팅 UI 제어
        const latestMsg = document.getElementById('latest-msg');
        const chatContainer = document.getElementById('chat-container');
        const chatInput = document.getElementById('chat-input');
        const chatMessages = document.getElementById('chat-messages');

        latestMsg.addEventListener('click', (e) => {
            e.stopPropagation(); 
            latestMsg.style.display = 'none';
            chatContainer.style.display = 'flex';
            chatInput.focus();
        });

        function closeChat() {
            if (chatContainer.style.display === 'flex') {
                chatContainer.style.display = 'none';
                latestMsg.style.display = 'block';
                chatInput.blur(); 
            }
        }

        document.getElementById('game-container').addEventListener('mousedown', (e) => {
            if (!chatContainer.contains(e.target) && e.target !== latestMsg) closeChat();
        });
        document.getElementById('game-container').addEventListener('touchstart', (e) => {
            if (!chatContainer.contains(e.target) && e.target !== latestMsg) closeChat();
        });

        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                if (chatInput.value.trim() !== '') {
                    socket.emit('send_msg', chatInput.value.trim());
                    chatInput.value = ''; 
                }
                closeChat(); 
            }
            if (e.key === 'Escape') closeChat(); 
        });

        socket.on('receive_msg', (data) => {
            let prefix = '[관전]';
            let colorClass = 'msg-spec';

            if (data.role === 'player') { prefix = '[1P]'; colorClass = 'msg-1p'; } 
            else if (data.role === 'bot') { prefix = '[2P]'; colorClass = 'msg-2p'; } 
            else if (data.role === 'sys') { prefix = '📢'; colorClass = 'msg-sys'; }

            const formattedMsg = `<span class="${colorClass}">${prefix}</span> ${data.msg}`;
            
            const msgEl = document.createElement('div');
            msgEl.innerHTML = formattedMsg;
            chatMessages.appendChild(msgEl);
            chatMessages.scrollTop = chatMessages.scrollHeight; 

            latestMsg.innerHTML = formattedMsg;
        });

        // ==========================================
        // [클라이언트 조작 최적화] 대시는 전용 트리거 신호만 서버로 전송
        // ==========================================
        const keys = { left: false, right: false };
        const dashCooldown = 5000;
        let lastLeftPress = 0, lastRightPress = 0, lastDashTime = 0;
        const doubleTapThreshold = 250;
        const dashUI = document.getElementById('dash-ui');

        function triggerDash(direction) {
            socket.emit('do_dash', direction); // 서버로 "대시 실행해!" 신호 전송
            lastDashTime = Date.now();
        }

        setInterval(() => {
            socket.emit('player_input', keys); // 일반 방향키 상태 동기화

            const absoluteTime = Date.now();
            if (absoluteTime - lastDashTime >= dashCooldown) { 
                dashUI.innerText = "DASH: READY"; dashUI.classList.add('dash-ready'); 
            } else { 
                const remaining = ((dashCooldown - (absoluteTime - lastDashTime)) / 1000).toFixed(1); 
                dashUI.innerText = `DASH: ${remaining}s`; dashUI.classList.remove('dash-ready'); 
            }
        }, 1000 / 60);

        window.addEventListener('keydown', (e) => { 
            if (chatContainer.style.display === 'flex' || document.activeElement === chatInput) return;

            const time = Date.now();
            if (e.code === 'ArrowLeft') {
                if (!keys.left && time - lastLeftPress < doubleTapThreshold && time - lastDashTime >= dashCooldown) triggerDash(-1);
                lastLeftPress = time; keys.left = true;
            }
            if (e.code === 'ArrowRight') {
                if (!keys.right && time - lastRightPress < doubleTapThreshold && time - lastDashTime >= dashCooldown) triggerDash(1);
                lastRightPress = time; keys.right = true;
            }
        });
        
        window.addEventListener('keyup', (e) => { 
            if (chatContainer.style.display === 'flex' || document.activeElement === chatInput) return;
            if (e.code === 'ArrowLeft') keys.left = false;
            if (e.code === 'ArrowRight') keys.right = false;
        });

        function handleTouch(e) {
            if (chatContainer.contains(e.target) || e.target === latestMsg) return; 

            e.preventDefault();
            const screenMiddle = window.innerWidth / 2;
            let isLeftTouched = false, isRightTouched = false;

            if (e.type === 'touchstart') {
                for (let i = 0; i < e.changedTouches.length; i++) {
                    const time = Date.now();
                    if (e.changedTouches[i].clientX < screenMiddle) {
                        if (!keys.left && time - lastLeftPress < doubleTapThreshold && time - lastDashTime >= dashCooldown) triggerDash(-1);
                        lastLeftPress = time;
                    } else {
                        if (!keys.right && time - lastRightPress < doubleTapThreshold && time - lastDashTime >= dashCooldown) triggerDash(1);
                        lastRightPress = time;
                    }
                }
            }

            for (let i = 0; i < e.touches.length; i++) {
                if (e.touches[i].clientX < screenMiddle) isLeftTouched = true;
                else isRightTouched = true;
            }

            keys.left = isLeftTouched;
            keys.right = isRightTouched;
        }

        window.addEventListener('touchstart', handleTouch, { passive: false });
        window.addEventListener('touchmove', handleTouch, { passive: false });
        window.addEventListener('touchend', handleTouch, { passive: false });

        Render.run(render);
        Runner.run(Runner.create(), engine);
    </script>
</body>
</html>
